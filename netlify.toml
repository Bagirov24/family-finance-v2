[build]
  base    = "/"
  command = "corepack enable && pnpm install --no-frozen-lockfile && pnpm --filter web build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION            = "20"
  PNPM_VERSION            = "9"
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_ENV                = "production"

[build.processing]
  skip_processing = false

[[plugins]]
  package = "@netlify/plugin-nextjs"
