[build]
  base    = "/"
  command = "corepack enable && pnpm install --no-frozen-lockfile && pnpm --filter web build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION            = "20"
  PNPM_VERSION            = "9"
  NETLIFY_USE_PNPM        = "true"
  NEXT_TELEMETRY_DISABLED = "1"
  # NODE_ENV is intentionally omitted here: setting it to 'production'
  # causes pnpm to skip devDependencies (TypeScript, ESLint, Next.js
  # itself) and breaks the build. Next.js sets NODE_ENV=production
  # internally during `next build`.

[build.processing]
  skip_processing = false

[[plugins]]
  package = "@netlify/plugin-nextjs"
