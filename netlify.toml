[build]
  base    = "apps/web"
  command = "npm install next@15.3.3 --save-exact && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION            = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_ENV                = "production"

[build.processing]
  skip_processing = false

[[plugins]]
  package = "@netlify/plugin-nextjs"
